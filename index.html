:root{
  --cream:#F5EFE6; --creamD:#EDE4D2; --paper:#FAF6EE;
  --ink:#2B2622; --ink2:#5A4F45; --ink3:#8C8275; --ink4:#B8AE9D;
  --line:#D8CFC0; --soft:#E8DFD0;
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'Manrope',system-ui,sans-serif;
  --mono:'JetBrains Mono','SF Mono',monospace;
  --nav-h:64px;
}
html[data-theme="greige"]  {--tint:#EFE6D2;--mid:#C9BBA0;--deep:#8A7B62;--pink:#5C4F3B;}
html[data-theme="sage"]    {--tint:#DCE4D2;--mid:#A8B895;--deep:#6E8059;--pink:#4D5C3D;}
html[data-theme="lavender"]{--tint:#E1DAE6;--mid:#B6A8C4;--deep:#8473A0;--pink:#5C4E73;}
html[data-theme="sky"]     {--tint:#D8E1E7;--mid:#A7BACA;--deep:#6F8DA4;--pink:#4D6577;}
html[data-theme="blush"]   {--tint:#ECD9D2;--mid:#D2A99A;--deep:#A87567;--pink:#76493D;}
html[data-theme="clay"]    {--tint:#E5C9B3;--mid:#C99577;--deep:#9A6243;--pink:#6B4029;}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  background:var(--cream); color:var(--ink); font-family:var(--sans);
  font-size:16px; line-height:1.45; -webkit-font-smoothing:antialiased;
  overscroll-behavior-y:none;
}
.app{ max-width:520px; margin:0 auto; min-height:100vh; position:relative; }

/* ---------- topbar ---------- */
.topbar{
  position:sticky; top:0; z-index:30; background:var(--paper);
  border-bottom:1px solid var(--line);
  padding:calc(env(safe-area-inset-top) + 12px) 18px 12px;
  display:flex; align-items:center; gap:10px;
}
.topbar .brand{ font-family:var(--serif); font-style:italic; font-size:21px; color:var(--ink); flex:1; }
.iconbtn{
  width:38px; height:38px; border-radius:12px; border:1px solid var(--line);
  background:var(--cream); display:flex; align-items:center; justify-content:center;
  color:var(--ink2); cursor:pointer; flex:none;
}
.iconbtn:active{ background:var(--tint); }

/* ---------- screens ---------- */
.screens{ padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 16px); }
.screen{ display:none; padding:8px 0 0; }
.screen.active{ display:block; animation:fade .18s ease; }
@keyframes fade{ from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:none;} }

/* ---------- date / month strip ---------- */
.dater{
  display:flex; align-items:center; gap:12px; padding:14px 18px 4px;
}
.dater .nav{
  width:40px; height:40px; border-radius:999px; border:1px solid var(--line);
  background:var(--paper); display:flex; align-items:center; justify-content:center;
  font-size:20px; color:var(--ink2); cursor:pointer; flex:none;
}
.dater .nav:active{ background:var(--tint); }
.dater .center{ flex:1; text-align:center; }
.dater .big{ font-family:var(--serif); font-style:italic; font-weight:600; font-size:30px; color:var(--ink); line-height:1.05; }
.dater .sub{ font-family:var(--mono); font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--ink3); margin-top:2px; }
.today-btn{ display:block; margin:6px auto 0; font-family:var(--mono); font-size:11px; letter-spacing:.1em;
  text-transform:uppercase; color:var(--deep); background:var(--tint); border:none; border-radius:999px;
  padding:5px 14px; cursor:pointer; }

/* ---------- card ---------- */
.card{
  background:var(--paper); border:1px solid var(--line); border-radius:18px;
  padding:16px 16px; margin:12px 14px;
}
.card.tint{ background:var(--tint); border-color:transparent; }

  /* ---------------- imágenes (IndexedDB + compresión) ---------------- */
  function idbOpen(){
    return new Promise(function(res,rej){
      var r=indexedDB.open('pm-vision',1);
      r.onupgradeneeded=function(){ if(!r.result.objectStoreNames.contains('imgs')) r.result.createObjectStore('imgs'); };
      r.onsuccess=function(){ res(r.result); };
      r.onerror=function(){ rej(r.error); };
    });
  }
  function idbPut(id,val){ return idbOpen().then(function(db){ return new Promise(function(res,rej){
    var tx=db.transaction('imgs','readwrite'); tx.objectStore('imgs').put(val,id);
    tx.oncomplete=function(){ res(); }; tx.onerror=function(){ rej(tx.error); }; }); }); }
  function idbGet(id){ return idbOpen().then(function(db){ return new Promise(function(res){
    var tx=db.transaction('imgs','readonly'); var rq=tx.objectStore('imgs').get(id);
    rq.onsuccess=function(){ res(rq.result); }; rq.onerror=function(){ res(null); }; }); }); }
  function idbDel(id){ return idbOpen().then(function(db){ return new Promise(function(res){
    var tx=db.transaction('imgs','readwrite'); tx.objectStore('imgs').delete(id); tx.oncomplete=function(){ res(); }; }); }); }
  function idbAll(){ return idbOpen().then(function(db){ return new Promise(function(res){
    var out={}, tx=db.transaction('imgs','readonly'), cur=tx.objectStore('imgs').openCursor();
    cur.onsuccess=function(e){ var c=e.target.result; if(c){ out[c.key]=c.value; c.continue(); } else res(out); };
    cur.onerror=function(){ res(out); }; }); }).catch(function(){ return {}; }); }

  function processImage(file, cb){
    var rd=new FileReader();
    rd.onload=function(){ var img=new Image();
      img.onload=function(){
        var max=900, w=img.width, hh=img.height, sc=Math.min(1, max/Math.max(w,hh));
        var cw=Math.round(w*sc), ch=Math.round(hh*sc);
        var cv=document.createElement('canvas'); cv.width=cw; cv.height=ch;
        cv.getContext('2d').drawImage(img,0,0,cw,ch);
        cb(cv.toDataURL('image/jpeg',0.72), cw, ch);
      };
      img.onerror=function(){};
      img.src=rd.result;
    };
    rd.readAsDataURL(file);
  }

  /* lista genérica con auto-crecer + borrar (todos / prioridades) */
  function listCard(title, key, addLabel){
    var items=getJSON(key,[]);
    var c=card(title);
    function persist(){ setJSON(key, items); }
    function rebuild(){
      Array.prototype.slice.call(c.querySelectorAll('.li')).forEach(function(n){n.remove()});
      var addb=c.querySelector('.addbtn');
      items.forEach(function(it,i){
        var inp=h('input',{class:'f-line t',placeholder:'…'}); inp.value=it.t;
        inp.addEventListener('input',function(){ it.t=inp.value; persist(); });
        var row=h('div',{class:'item li',style:'display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--soft)'},[
          check(it.done,function(v){ it.done=v; persist(); if(v) inp.classList.add('txt-done'); else inp.classList.remove('txt-done'); }),
          inp,
          h('span',{class:'del',onclick:function(){ items.splice(i,1); persist(); rebuild(); }},'×')
        ]);
        if(it.done) inp.classList.add('txt-done');
        c.insertBefore(row, addb);
      });
    }
    var addb=h('button',{class:'addbtn',onclick:function(){ items.push({t:'',done:false}); persist(); rebuild();
      var ins=c.querySelectorAll('.li input'); if(ins.length) ins[ins.length-1].focus(); }},
      [h('span',null,'＋ '+addLabel)]);
    c.appendChild(addb);
    rebuild();
    return c;
  }

    var habits=getJSON(P+'habits',[]);
    if(!habits.length){ habits=[{id:uid(),name:''},{id:uid(),name:''},{id:uid(),name:''},{id:uid(),name:''},{id:uid(),name:''},{id:uid(),name:''}]; setJSON(P+'habits',habits); }

    var c=card(null);

      });

  function visionAddImages(files){
    Array.prototype.slice.call(files).forEach(function(file){

      processImage(file,function(dataURL,w,hh){

    var items=vGet(); var it=items.filter(function(x){ return x.id===id; })[0];

  /* ===================================================================

  var THEMES=[['greige','Greige','#C9BBA0'],['sage','Salvia','#A8B895'],['lavender','Lavanda','#B6A8C4'],
              ['sky','Cielo','#A7BACA'],['blush','Rubor','#D2A99A'],['clay','Arcilla','#C99577']];
  function applyTheme(id){
    document.documentElement.setAttribute('data-theme',id);
    save(P+'theme',id);
    var tc={greige:'#F5EFE6',sage:'#F5EFE6',lavender:'#F5EFE6',sky:'#F5EFE6',blush:'#F5EFE6',clay:'#F5EFE6'};
    var mt=document.querySelector('meta[name=theme-color]'); if(mt) mt.setAttribute('content', tc[id]||'#F5EFE6');
    var list=document.getElementById('themeList');
    Array.prototype.forEach.call(list.children,function(ch){ ch.classList.toggle('sel', ch.getAttribute('data-id')===id); });
  }
  function buildThemeSheet(){
    var list=document.getElementById('themeList');
    THEMES.forEach(function(t){
      var o=h('div',{class:'theme-opt','data-id':t[0],onclick:function(){ applyTheme(t[0]); }},[
        h('div',{class:'sw',style:'background:'+t[2]}), h('div',{class:'nm'},t[1])
      ]);
      list.appendChild(o);
    });
    var bg=document.getElementById('sheetBg'), sheet=document.getElementById('sheet');
    function open(){ bg.classList.add('open'); sheet.classList.add('open'); }
    function close(){ bg.classList.remove('open'); sheet.classList.remove('open'); }
    document.getElementById('themeBtn').addEventListener('click',open);
    bg.addEventListener('click',close);

    /* export / import */
    document.getElementById('exportBtn').addEventListener('click', doExport);
    document.getElementById('importBtn').addEventListener('click',function(){ document.getElementById('importFile').click(); });
    document.getElementById('importFile').addEventListener('change',function(e){
      var f=e.target.files&&e.target.files[0]; if(f) doImport(f);
    });
  }
  function doExport(){
    var data={}; try{ for(var i=0;i<localStorage.length;i++){ var k=localStorage.key(i); if(k.indexOf(P)===0) data[k]=ls(k); } }catch(e){}
    idbAll().then(function(images){
      var blob=new Blob([JSON.stringify({app:'Planner movil',version:2,fecha:new Date().toISOString(),data:data,images:images})],{type:'application/json'});
      var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='planner-datos.json'; a.click();
      setTimeout(function(){ URL.revokeObjectURL(a.href); },1500);
      save(P+'lastbackup', dkey(new Date()));
      var n=document.getElementById('backupNudge'); if(n) n.style.display='none';
    });
  }
  function doImport(file){
    var r=new FileReader();
    r.onload=function(){
      try{
        var o=JSON.parse(r.result); var d=o.data||o;
        Object.keys(d).forEach(function(k){ if(k.indexOf(P)===0) save(k,d[k]); });
        var imgs=o.images||{}; var ids=Object.keys(imgs);
        if(!ids.length){ location.reload(); return; }
        var pending=ids.length;
        ids.forEach(function(id){ idbPut(id,imgs[id]).then(done).catch(done); });
        function done(){ if(--pending<=0) location.reload(); }
      }catch(e){ alert('Archivo no válido'); }
    };
    r.readAsText(file);
  }
  var SYS=['pm:theme','pm:lasttab','pm:lastbackup','pm:backupsnooze'];
  function hasUserData(){ try{ for(var i=0;i<localStorage.length;i++){ var k=localStorage.key(i); if(k.indexOf(P)===0 && SYS.indexOf(k)<0) return true; } }catch(e){} return false; }
  function setupBackupNudge(){
    document.getElementById('nudgeBackup').addEventListener('click', doExport);
    document.getElementById('nudgeClose').addEventListener('click', function(){
      save(P+'backupsnooze', dkey(new Date())); document.getElementById('backupNudge').style.display='none';
    });
    // mostrar solo si hay datos y hace tiempo de la última copia (y no se ha pospuesto hace poco)
    if(hasUserData() && daysSince(ls(P+'lastbackup'))>=14 && daysSince(ls(P+'backupsnooze'))>=6){
      document.getElementById('backupNudge').style.display='flex';
    }
  }
  function setupPWA(){
    // pedir almacenamiento persistente → el navegador no borra los datos por falta de espacio
    try{ if(navigator.storage && navigator.storage.persist) navigator.storage.persist(); }catch(e){}
    if('serviceWorker' in navigator && location.protocol.indexOf('http')===0){
      navigator.serviceWorker.register('sw.js').catch(function(){});
    }
    var deferred=null, btn=document.getElementById('installBtn');
    window.addEventListener('beforeinstallprompt',function(e){ e.preventDefault(); deferred=e; btn.style.display='flex'; });
    btn.addEventListener('click',function(){ if(deferred){ deferred.prompt(); deferred=null; btn.style.display='none'; } });
  }

  /* ===================================================================
     ARRANQUE
     =================================================================== */
  buildScreens();
  buildNav();
  buildThemeSheet();
  applyTheme(ls(P+'theme')||'greige');
  setupPWA();
  setupBackupNudge();
  show(ls(P+'lasttab')||'hoy');
})();

</script>
</body>
</html>
